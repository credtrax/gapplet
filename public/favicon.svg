<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" aria-label="Joe's Word Nerd">
  <!-- Eyeglasses motif from the Joe's Word Nerd logo. Two rounded-square
       lenses with a bridge between them, right temple arm extending out
       (matches the logo's facing-right orientation). Navy on transparent
       so the glyph reads on light or dark browser tabs. -->
  <g fill="none" stroke="#0f1729" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round">
    <rect x="1.5" y="9" width="11" height="11" rx="2.2" />
    <rect x="19.5" y="9" width="11" height="11" rx="2.2" />
    <line x1="12.5" y1="13" x2="19.5" y2="13" />
    <line x1="30.5" y1="12" x2="32" y2="10.5" />
    <line x1="1.5" y1="12" x2="0" y2="11.5" />
  </g>
</svg>
